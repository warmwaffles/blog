baseURL: https://mattjohnston.co/
locale: en-us
title: Matthew Johnston
theme: papermod
paginate: 10

enableRobotsTXT: true
enableEmoji: true

minify:
  disableXML: true

languages:
  en:
    label: English
    weight: 1
    menu:
      main:
        - name: Resume
          url: resume
          weight: 1
        - name: Posts
          url: posts
          weight: 2
        - name: Projects
          url: projects
          weight: 3
        - name: Categories
          url: categories
          weight: 4
        - name: Tags
          url: tags
          weight: 5

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  ShowShareButtons: false
  profileMode:
    enabled: true
    title: Howdy
    subtitle: Follow my shenanigans
    buttons:
      - name: Posts
        url: posts
      - name: Github
        url: https://github.com/warmwaffles
      - name: Codeberg
        url: https://codeberg.org/warmwaffles
      - name: X
        url: https://twitter.com/warmwaffle
